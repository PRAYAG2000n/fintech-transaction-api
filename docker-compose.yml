version: '3.8'
services:
  api:
    image: fintech-api:latest
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=postgres
      - DB_NAME=fintech_db
      - DB_USER=fintech
      - DB_PASSWORD=localdevpass2024
      - REDIS_HOST=redis
      - JWT_SECRET=myFintechAppSecret2024DoNotCommitThis
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=fintech
      - POSTGRES_PASSWORD=localdevpass2024
      - POSTGRES_DB=fintech_db
    # volumes:
    #   - ./data:/var/lib/postgresql/data

  redis:
    image: redis:7
    # expose 6379 only if debugging with redis-cli
