server:
  port: 8080

spring:
  application:
    name: fintech-transaction-api
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:fintech_db}
    username: ${DB_USER:fintech}
    password: ${DB_PASSWORD:localdevpass2024}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update  # switch to validate in prod
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: 600000

security:
  jwt:
    secret: ${JWT_SECRET:myFintechAppSecret2024DoNotCommitThis}
    expiration: 3600000
    refresh-expiration: 86400000

encryption:
  key: ${ENCRYPTION_KEY:your-32-byte-encryption-key!!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.fintech: DEBUG
